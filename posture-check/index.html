<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Posture-Check</title>
</head>
<body>
  <p>Opening Posture-Check…</p>
  <script>
    const target = new URL("landing/index.html", window.location.href);
    const lang = localStorage.getItem("postureCheck.language") || "es";
    const theme = localStorage.getItem("postureCheck.theme") || "light";
    target.searchParams.set("lang", lang);
    target.searchParams.set("theme", theme);
    window.location.replace(target.href);
  </script>
</body>
</html>
